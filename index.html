<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warning System</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #00ff66;
      font-family: Consolas, Monaco, monospace;
      overflow: hidden;
    }

    #videoBackground {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: -2;
    }

    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 102, 0.05),
        rgba(0, 255, 102, 0.05) 1px,
        transparent 1px,
        transparent 4px
      );
    }

    .screen {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10vh 20px 20px;
      text-align: center;
    }

    .mainBox {
      width: min(650px, 100%);
    }

    #warningBox {
      animation: flicker 0.9s infinite;
      margin-bottom: 28px;
    }

    #warningBox h1 {
      margin: 0;
      color: #ff2b2b;
      font-size: clamp(42px, 10vw, 110px);
      letter-spacing: 10px;
      text-shadow: 0 0 10px #ff0000, 0 0 30px #ff0000;
    }

    #warningBox p {
      color: white;
      font-size: 16px;
      margin-top: 18px;
    }

    #searchBox {
      width: 100%;
    }

    input {
      width: 100%;
      padding: 16px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #00ff66;
      color: #00ff66;
      outline: none;
      font-family: inherit;
      font-size: 18px;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
    }

    .hint {
      color: #d0d0d0;
      font-size: 13px;
      margin-top: 12px;
    }

    #result {
      display: none;
      width: 100%;
      text-align: left;
      border: 1px solid #00ff66;
      background: rgba(0, 15, 5, 0.88);
      padding: 24px;
      margin-top: 28px;
      box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
    }

    .data-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    .label {
      color: #a0a0a0;
    }

    .not-found {
      color: #ff5252;
      text-align: center;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
  </style>
</head>

<body>
  <!-- UBAH nama file ini sesuai nama MP4 Anda -->
  <video id="videoBackground" autoplay muted loop playsinline>
    <source src="yut.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>
  <div class="scanline"></div>

  <main class="screen">
    <section class="mainBox">
      <div id="warningBox">
        <h1>WARNING</h1>
        <p>SYSTEM ACCESS DETECTED...</p>
      </div>

      <div id="searchBox">
        <input
          id="nameInput"
          type="text"
          placeholder="Ketik nama, lalu tekan Enter..."
          autocomplete="off"
        >
        <p class="hint">Masukkan nama untuk mencari profil</p>
      </div>

      <section id="result"></section>
    </section>
  </main>

  <script>
    const database = {
      andi: {
        nama: "Andi Pratama",
        umur: "22 tahun",
        kota: "Surabaya",
        pekerjaan: "Mahasiswa",
        hobi: "Pemrograman dan desain"
      },
      siti: {
        nama: "Siti Aisyah",
        umur: "24 tahun",
        kota: "Malang",
        pekerjaan: "Desainer grafis",
        hobi: "Fotografi"
      },
      budi: {
        nama: "Budi Santoso",
        umur: "28 tahun",
        kota: "Jakarta",
        pekerjaan: "Web Developer",
        hobi: "Game dan musik"
      }
    };

    const nameInput = document.getElementById("nameInput");
    const result = document.getElementById("result");

    nameInput.focus();

    nameInput.addEventListener("keydown", function(event) {
      if (event.key !== "Enter") return;

      const keyword = nameInput.value.trim().toLowerCase();
      if (!keyword) return;

      result.style.display = "block";

      if (database[keyword]) {
        const orang = database[keyword];

        result.innerHTML = `
          <h2>&gt; DATA DITEMUKAN</h2>
          <div class="data-row"><span class="label">Nama</span><span>: ${orang.nama}</span></div>
          <div class="data-row"><span class="label">Umur</span><span>: ${orang.umur}</span></div>
          <div class="data-row"><span class="label">Kota</span><span>: ${orang.kota}</span></div>
          <div class="data-row"><span class="label">Pekerjaan</span><span>: ${orang.pekerjaan}</span></div>
          <div class="data-row"><span class="label">Hobi</span><span>: ${orang.hobi}</span></div>
        `;
      } else {
        result.innerHTML = `
          <h2 class="not-found">DATA TIDAK DITEMUKAN</h2>
          <p class="not-found">Nama "${nameInput.value}" tidak ada di database.</p>
        `;
      }
    });
  </script>
</body>
</html>
